name: Publish Mobile Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "platform/mobile/**"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 0.1.${{ github.run_number }}
      RELEASE_UPLOAD_TOKEN: ${{ secrets.APP_RELEASES_UPLOAD_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Build Debug APK
        working-directory: platform/mobile
        env:
          ORG_GRADLE_PROJECT_mesha.clerk.publishableKey.debug: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_DEBUG }}
        run: |
          ./gradlew :app:assembleDebug \
            --no-daemon \
            -Pmesha.versionCode=${VERSION_CODE} \
            -Pmesha.versionName=${VERSION_NAME} \
            -Pmesha.api.baseUrl.debug=https://mesha-api.onrender.com/

      - name: Verify APK
        working-directory: platform/mobile
        run: |
          echo "APK files:"
          find app/build/outputs -name "*.apk"

          ls -lah app/build/outputs/apk/debug

          test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesha-android-debug-${{ github.run_number }}
          path: platform/mobile/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Commit APK to repo
        run: |
          cp platform/mobile/app/build/outputs/apk/debug/app-debug.apk releases/android/app-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/android/app-debug.apk
          git diff --cached --quiet || {
            git commit -m "chore(release): Android debug APK v${VERSION_NAME} [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          }

      - name: Wait for Backend
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mesha-api.onrender.com/actuator/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Upload APK to Mesha Backend
        working-directory: platform/mobile
        run: |
          curl \
            --verbose \
            --show-error \
            --fail-with-body \
            --retry 3 \
            --retry-delay 30 \
            --retry-all-errors \
            --write-out "\nHTTP_STATUS=%{http_code}\n" \
            -X POST "https://mesha-api.onrender.com/api/releases" \
            -H "Authorization: Bearer ${RELEASE_UPLOAD_TOKEN}" \
            -F "file=@app/build/outputs/apk/debug/app-debug.apk" \
            -F "platform=ANDROID" \
            -F "versionName=${VERSION_NAME}" \
            -F "versionCode=${VERSION_CODE}" \
            -F "minSdk=33" \
            -F "releaseNotes=Automated build from ${GITHUB_SHA}"
