name: Vercel Frontend CD

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "platform/frontend/**"

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Vercel secrets
        id: vercel-secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Vercel deployment skipped::Configure VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID repository secrets to enable Vercel deployments."
          fi

      - name: Require Vercel secrets for production
        if: github.ref == 'refs/heads/main' && steps.vercel-secrets.outputs.configured != 'true'
        run: |
          echo "VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID repository secrets are required for production deployments." >&2
          exit 1

      - name: Skip preview deploy without Vercel secrets
        if: github.event_name == 'pull_request' && steps.vercel-secrets.outputs.configured != 'true'
        run: echo "Skipping Vercel preview deploy until repository secrets are configured."

      - name: Install Vercel CLI
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (production)
        if: github.ref == 'refs/heads/main' && steps.vercel-secrets.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./platform/frontend

      - name: Pull Vercel environment (preview)
        if: github.ref != 'refs/heads/main' && steps.vercel-secrets.outputs.configured == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./platform/frontend

      - name: Build project (production)
        if: github.ref == 'refs/heads/main' && steps.vercel-secrets.outputs.configured == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./platform/frontend

      - name: Build project (preview)
        if: github.ref != 'refs/heads/main' && steps.vercel-secrets.outputs.configured == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./platform/frontend

      - name: Deploy to production
        if: github.ref == 'refs/heads/main' && steps.vercel-secrets.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./platform/frontend

      - name: Deploy preview & comment PR
        if: github.event_name == 'pull_request' && steps.vercel-secrets.outputs.configured == 'true'
        id: preview
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        working-directory: ./platform/frontend

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Vercel Preview Deployment\n\n✅ Preview ready at: ${url}`,
            });
