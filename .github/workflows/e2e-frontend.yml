name: E2E Frontend

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  e2e-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./platform/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./platform/frontend
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Wait for Vercel Preview deployment
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: vercel-preview
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          allow_inactive: true

      - name: Run frontend E2E tests
        working-directory: ./platform/frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel-preview.outputs.url }}
          VERCEL_PREVIEW_URL: ${{ steps.vercel-preview.outputs.url }}
          E2E_TEST_ENV: preview
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /workspaces
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-frontend-${{ github.run_id }}
          path: platform/frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-frontend-${{ github.run_id }}
          path: platform/frontend/playwright-results/
          retention-days: 14
