name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend-api: ${{ steps.filter.outputs.backend-api }}
      backend-worker: ${{ steps.filter.outputs.backend-worker }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'platform/frontend/**'
            backend-api:
              - 'platform/backend-api/**'
            backend-worker:
              - 'platform/backend-worker/**'

  validate-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./platform/frontend
        run: npm ci
      - name: Lint
        working-directory: ./platform/frontend
        run: npm run lint
      - name: Type check
        working-directory: ./platform/frontend
        run: npm run type-check
      - name: Build check
        working-directory: ./platform/frontend
        run: npm run build

  validate-backend-api:
    needs: changes
    if: needs.changes.outputs.backend-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - name: Compile and test
        working-directory: ./platform/backend-api
        run: mvn clean test

  validate-backend-worker:
    needs: changes
    if: needs.changes.outputs.backend-worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - name: Compile and test
        working-directory: ./platform/backend-worker
        run: mvn clean test

  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./platform/frontend
        run: npm ci
      - name: Dependency audit
        working-directory: ./platform/frontend
        run: npm audit --audit-level=critical
      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Aggregator — always runs so branch protection check "ci" is always satisfied.
  # Fails if any validation failed; passes (or skips) when no relevant paths changed.
  ci:
    needs: [validate-frontend, validate-backend-api, validate-backend-worker, quality]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all validations passed
        run: |
          results=(
            "${{ needs.validate-frontend.result }}"
            "${{ needs.validate-backend-api.result }}"
            "${{ needs.validate-backend-worker.result }}"
            "${{ needs.quality.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "A validation job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "All applicable validations passed."
