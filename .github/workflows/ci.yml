name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend-api: ${{ steps.filter.outputs.backend-api }}
      connector: ${{ steps.filter.outputs.connector }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'platform/frontend/**'
            backend-api:
              - 'platform/backend-api/**'
            connector:
              - 'platform/connector/**'
            mobile:
              - 'platform/mobile/**'

  validate-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./platform/frontend
        run: npm ci
      - name: Lint
        working-directory: ./platform/frontend
        run: npm run lint
      - name: Type check
        working-directory: ./platform/frontend
        run: npm run type-check
      - name: Build check
        working-directory: ./platform/frontend
        run: npm run build

  validate-backend-api:
    needs: changes
    if: needs.changes.outputs.backend-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - name: Compile and test
        working-directory: ./platform/backend-api
        run: mvn clean test
        env:
          SENTRY_SKIP_SOURCE_BUNDLE: "true"

  validate-connector:
    needs: changes
    if: needs.changes.outputs.connector == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build and test
        working-directory: ./platform/connector
        run: ./gradlew clean build --no-daemon

  validate-mobile:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Assemble debug APK
        working-directory: ./platform/mobile
        run: ./gradlew :app:assembleDebug --no-daemon
        env:
          ORG_GRADLE_PROJECT_mesha.clerk.publishableKey.debug: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_DEBUG }}
      - name: Unit tests
        working-directory: ./platform/mobile
        run: ./gradlew :app:testDebugUnitTest --no-daemon
        env:
          ORG_GRADLE_PROJECT_mesha.clerk.publishableKey.debug: ${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_DEBUG }}

  # Publishes a debug-signed APK to the in-app update feed on every push to main. Debug
  # signing is intentional for now (no release keystore yet) — see RELEASE_PROCESS.md.
  publish-mobile-release:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.mobile == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Assemble debug APK
        working-directory: ./platform/mobile
        run: |
          ./gradlew :app:assembleDebug --no-daemon \
            -Pmesha.versionCode=${{ github.run_number }} \
            -Pmesha.versionName=0.1.${{ github.run_number }} \
            -Pmesha.clerk.publishableKey.debug=${{ secrets.MOBILE_CLERK_PUBLISHABLE_KEY_DEBUG }}
      - name: Upload to release feed
        working-directory: ./platform/mobile
        run: |
          curl \
            --fail-with-body \
            -v \
            -X POST "https://mesha-api.onrender.com/api/releases" \
            -H "Authorization: Bearer ${{ secrets.APP_RELEASES_UPLOAD_TOKEN }}" \
            -F "file=@app/build/outputs/apk/debug/app-debug.apk" \
            -F "platform=ANDROID" \
            -F "versionName=0.1.${{ github.run_number }}" \
            -F "versionCode=${{ github.run_number }}" \
            -F "minSdk=33" \
            -F "releaseNotes=Automated build from ${{ github.sha }}"

  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./platform/frontend
        run: npm ci
      - name: Dependency audit
        working-directory: ./platform/frontend
        run: npm audit --audit-level=critical
      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Aggregator — always runs so branch protection check "ci" is always satisfied.
  # Fails if any validation failed; passes (or skips) when no relevant paths changed.
  ci:
    needs:
      [
        validate-frontend,
        validate-backend-api,
        validate-connector,
        validate-mobile,
        publish-mobile-release,
        quality,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all validations passed
        run: |
          results=(
            "${{ needs.validate-frontend.result }}"
            "${{ needs.validate-backend-api.result }}"
            "${{ needs.validate-connector.result }}"
            "${{ needs.validate-mobile.result }}"
            "${{ needs.publish-mobile-release.result }}"
            "${{ needs.quality.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "A validation job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "All applicable validations passed."
