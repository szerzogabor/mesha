name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # FRONTEND
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        working-directory: ./platform/frontend
        run: npm install
      - name: Build frontend
        working-directory: ./platform/frontend
        run: npm run build

      # BACKEND API
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build backend-api
        working-directory: ./platform/backend-api
        run: mvn clean package -DskipTests

      # BACKEND WORKER
      - name: Build backend-worker
        working-directory: ./platform/backend-worker
        run: mvn clean package -DskipTests
