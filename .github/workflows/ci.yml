name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # FRONTEND
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Install frontend deps
        working-directory: ./platform/frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./platform/frontend
        run: npm run build

      # BACKEND API
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build backend-api
        working-directory: ./platform/backend-api
        run: mvn clean package -DskipTests

      # BACKEND WORKER
      - name: Build backend-worker
        working-directory: ./platform/backend-worker
        run: mvn clean package -DskipTests

      - name: Override Vercel commit status
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context=Vercel \
            -f description="Deployments handled by GitHub Actions" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
