version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mesha
      POSTGRES_USER: mesha
      POSTGRES_PASSWORD: mesha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ../backend-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mesha
      DB_USER: mesha
      DB_PASSWORD: mesha
      REDIS_URL: redis://redis:6379
      # OpenTelemetry Java Agent — mirrors the frontend's Grafana Cloud setup.
      # Set OTEL_EXPORTER_OTLP_ENDPOINT to the same value as the frontend's
      # NEXT_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT (e.g. https://otlp-gateway-prod-eu-central-0.grafana.net/otlp).
      # Set OTEL_EXPORTER_OTLP_HEADERS to "Authorization=Basic <base64>" where the
      # base64 value is the same as the frontend's NEXT_PUBLIC_OTEL_EXPORTER_OTLP_AUTH.
      OTEL_SERVICE_NAME: mesha-api
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-otlp}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      # Grafana Cloud OTLP gateway uses HTTP/protobuf, not gRPC
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_INSTRUMENTATION_LOGBACK_MDC_ADD_BAGGAGE: "true"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-worker:
    build:
      context: ../backend-worker
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mesha
      DB_USER: mesha
      DB_PASSWORD: mesha
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend-api

volumes:
  postgres_data:
