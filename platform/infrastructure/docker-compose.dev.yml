version: "3.9"

# Local development: only starts infrastructure dependencies (DB + Redis)
# Run backend and frontend locally on your machine

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mesha
      POSTGRES_USER: mesha
      POSTGRES_PASSWORD: mesha
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
