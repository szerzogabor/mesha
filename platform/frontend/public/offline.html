<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#5e6ad2" />
    <title>Mesha — Offline</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f0f10;
        color: #e8e8f0;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 360px; }
      .logo {
        width: 72px; height: 72px; border-radius: 18px;
        background: #5e6ad2; margin: 0 auto 20px;
        display: flex; align-items: center; justify-content: center;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; color: #8e8e98; margin: 0 0 24px; line-height: 1.5; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #5e6ad2; color: #fff; font-size: 14px; font-weight: 500;
        padding: 12px 20px; border-radius: 10px; min-height: 44px; width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg width="44" height="44" viewBox="0 0 512 512" aria-hidden="true">
          <path d="M133 399 V133 L256 287 L379 133 V399" fill="none" stroke="#fff"
                stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Mesha needs a connection to load your workspaces, issues, and live agent sessions. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
