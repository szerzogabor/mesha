spring:
  application:
    name: mesha-worker
  profiles:
    active: ${ENVIRONMENT:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mesha}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

sentry:
  dsn: ${SENTRY_DSN:https://c2f30f5b2b577059370f00a36ee7476f@o4511348602241024.ingest.de.sentry.io/4511423699877968}
  environment: ${ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:${APP_VERSION:0.0.1-SNAPSHOT}}
  # PII is handled by SentryConfig.BeforeSendCallback — do not enable default PII collection
  send-default-pii: false
  logs:
    enabled: true
  traces-sample-rate: 1.0
  profile-session-sample-rate: 1.0
  profile-lifecycle: TRACE
  # Attach thread info to events for async worker context
  attach-threads: true
  # Instrument Spring Security, scheduled tasks, etc.
  enable-automatic-session-tracking: false

mesha:
  blocks:
    api-url: ${BLOCKS_API_URL}
    api-key: ${BLOCKS_API_KEY}
  github:
    app-id: ${GITHUB_APP_ID}
    private-key: ${GITHUB_APP_PRIVATE_KEY}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET}

---
spring:
  config:
    activate:
      on-profile: production
sentry:
  traces-sample-rate: 0.1
  profile-session-sample-rate: 0.1

---
spring:
  config:
    activate:
      on-profile: staging
sentry:
  traces-sample-rate: 0.5
  profile-session-sample-rate: 0.5

---
spring:
  config:
    activate:
      on-profile: preview
sentry:
  traces-sample-rate: 1.0
  profile-session-sample-rate: 1.0

---
spring:
  config:
    activate:
      on-profile: local
sentry:
  traces-sample-rate: 1.0
  profile-session-sample-rate: 1.0
