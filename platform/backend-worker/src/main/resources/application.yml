spring:
  application:
    name: mesha-worker
  profiles:
    active: ${APP_ENV:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mesha}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0

mesha:
  blocks:
    api-url: ${BLOCKS_API_URL}
    api-key: ${BLOCKS_API_KEY}
  github:
    app-id: ${GITHUB_APP_ID}
    private-key: ${GITHUB_APP_PRIVATE_KEY}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET}

---
spring:
  config:
    activate:
      on-profile: production
management:
  tracing:
    sampling:
      probability: 0.1

---
spring:
  config:
    activate:
      on-profile: staging
management:
  tracing:
    sampling:
      probability: 0.5
