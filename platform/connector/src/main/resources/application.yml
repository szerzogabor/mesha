spring:
  application:
    name: mesha-connector
  profiles:
    active: ${APP_ENV:local}

connector:
  name: mesha-connector
  environment: ${APP_ENV:local}
  backend-url: ${CONNECTOR_BACKEND_URL:http://localhost:8080}
  credentials-path: ${CONNECTOR_CREDENTIALS_PATH:${user.home}/.mesha/connector/credentials.json}
  version: ${CONNECTOR_VERSION:0.0.1-SNAPSHOT}
  agent-registration-path: ${CONNECTOR_AGENT_REGISTRATION_PATH:${user.home}/.mesha/connector/agent.json}
  auto-connect:
    enabled: ${CONNECTOR_AUTO_CONNECT_ENABLED:false}
    mesha-token: ${CONNECTOR_AUTO_CONNECT_TOKEN:}
    executor-type: ${CONNECTOR_AUTO_CONNECT_EXECUTOR_TYPE:}
    capabilities: ${CONNECTOR_AUTO_CONNECT_CAPABILITIES:}
    hostname: ${CONNECTOR_AUTO_CONNECT_HOSTNAME:}
  polling:
    interval-ms: ${CONNECTOR_POLLING_INTERVAL_MS:5000}
    heartbeat-interval-ms: ${CONNECTOR_POLLING_HEARTBEAT_INTERVAL_MS:30000}
    backoff:
      base-ms: ${CONNECTOR_POLLING_BACKOFF_BASE_MS:5000}
      max-ms: ${CONNECTOR_POLLING_BACKOFF_MAX_MS:60000}
      multiplier: ${CONNECTOR_POLLING_BACKOFF_MULTIPLIER:2.0}
  workspace:
    root: ${CONNECTOR_WORKSPACE_ROOT:${user.home}/mesha-workspaces}
    cleanup-policy: ${CONNECTOR_WORKSPACE_CLEANUP_POLICY:NEVER}
  context:
    max-description-chars: ${CONNECTOR_CONTEXT_MAX_DESCRIPTION_CHARS:20000}

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Structured JSON logging — format handled by logback-spring.xml
logging:
  level:
    root: INFO
    com.mesha: DEBUG
