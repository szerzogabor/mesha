spring:
  application:
    name: mesha-api
  profiles:
    active: ${APP_ENV:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mesha}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${CLERK_JWKS_URI:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}

clerk:
  jwks-uri: ${CLERK_JWKS_URI:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Sentry observability configuration
sentry:
  dsn: ${SENTRY_DSN:https://b63b87ccbf37de2bfa73122d07404172@o4511348602241024.ingest.de.sentry.io/4511410200576080}
  environment: ${APP_ENV:local}
  release: ${APP_VERSION:0.0.1-SNAPSHOT}@${GIT_COMMIT:unknown}
  # Capture 100% of transactions in non-production; tune down in production via env var
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:1.0}
  profile-session-sample-rate: ${SENTRY_PROFILE_SAMPLE_RATE:1.0}
  profile-lifecycle: TRACE
  # SentryAppender is configured directly in logback-spring.xml; disable auto-configured
  # appender to prevent duplicate event capture in Sentry.
  logging:
    enabled: false
  # Attach request headers and IP for context; PII is scrubbed in BeforeSendCallback
  send-default-pii: true
  # Tag every event with the service name
  tags:
    service: mesha-api

ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
    base-url: https://api.anthropic.com

github:
  app:
    app-id: ${GITHUB_APP_ID:0}
    client-id: ${GITHUB_APP_CLIENT_ID:}
    client-secret: ${GITHUB_APP_CLIENT_SECRET:}
    private-key: ${GITHUB_APP_PRIVATE_KEY:}
    webhook-secret: ${GITHUB_APP_WEBHOOK_SECRET:}
    app-name: ${GITHUB_APP_NAME:mesha-github-app}

# Structured JSON logging — format handled by logback-spring.xml
logging:
  level:
    root: INFO
    com.mesha: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# OpenTelemetry Java Agent configuration
# These properties are read by the OTel agent at startup (via OTEL_* env vars or system properties).
# See: https://opentelemetry.io/docs/instrumentation/java/automatic/agent-config/
#
# Required environment variables in production:
#   OTEL_SERVICE_NAME=mesha-api                         (service name in traces)
#   OTEL_EXPORTER_OTLP_ENDPOINT=<tempo-url>             (Tempo gRPC/HTTP endpoint)
#   OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic <b64(user:token)>  (Grafana Cloud auth)
#   OTEL_EXPORTER_OTLP_PROTOCOL=grpc                    (or http/protobuf)
#   OTEL_TRACES_EXPORTER=otlp                           (send traces to Tempo)
#   OTEL_METRICS_EXPORTER=none                          (metrics handled by Actuator)
#   OTEL_LOGS_EXPORTER=none                             (logs handled by Loki4j)
#   OTEL_PROPAGATORS=tracecontext,baggage               (W3C Trace Context + Baggage)
#   OTEL_INSTRUMENTATION_LOGBACK_MDC_ADD_BAGGAGE=true   (inject OTel baggage into MDC)

# Loki log shipping configuration (used by logback-spring.xml Loki4jAppender)
# Required environment variables:
#   LOKI_URL=http://loki:3100                   (or Grafana Cloud Loki URL)
#   LOKI_USERNAME=<grafana-cloud-user-id>       (Grafana Cloud only; leave blank for local)
#   LOKI_PASSWORD=<grafana-cloud-api-key>       (Grafana Cloud only; leave blank for local)
