spring:
  application:
    name: mesha-api
  profiles:
    active: ${APP_ENV:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mesha}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: mesha-api-hikari
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD_MS:30000}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${CLERK_JWKS_URI:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}

clerk:
  jwks-uri: ${CLERK_JWKS_URI:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
    base-url: https://api.anthropic.com

blocks:
  webhook:
    secret: ${BLOCKS_WEBHOOK_SECRET:}

github:
  app:
    app-id: ${GITHUB_APP_ID:0}
    client-id: ${GITHUB_APP_CLIENT_ID:}
    client-secret: ${GITHUB_APP_CLIENT_SECRET:}
    private-key: ${GITHUB_APP_PRIVATE_KEY:}
    webhook-secret: ${GITHUB_APP_WEBHOOK_SECRET:}
    app-name: ${GITHUB_APP_NAME:mesha-github-app}

# Structured JSON logging — format handled by logback-spring.xml
logging:
  level:
    root: INFO
    com.mesha: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# OpenTelemetry Java Agent configuration — mirrors the frontend Grafana Cloud setup.
# The agent ships traces (Tempo) and logs (Loki) via the same OTLP gateway the
# frontend uses; credentials are identical to the frontend's NEXT_PUBLIC_OTEL_* vars.
#
# Required environment variables in production:
#   OTEL_EXPORTER_OTLP_ENDPOINT   Same URL as frontend NEXT_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT
#                                  e.g. https://otlp-gateway-prod-eu-central-0.grafana.net/otlp
#   OTEL_EXPORTER_OTLP_HEADERS    Authorization=Basic <base64>
#                                  where <base64> is the SAME value as the frontend's
#                                  NEXT_PUBLIC_OTEL_EXPORTER_OTLP_AUTH
#                                  i.e. base64("<instanceId>:<apiToken>")
#   OTEL_EXPORTER_OTLP_PROTOCOL   http/protobuf  (Grafana Cloud gateway is HTTP, not gRPC)
#   OTEL_TRACES_EXPORTER          otlp           (traces → Tempo via /v1/traces)
#   OTEL_LOGS_EXPORTER            otlp           (logs   → Loki  via /v1/logs)
#   OTEL_METRICS_EXPORTER         none           (metrics handled by Actuator)
#   OTEL_PROPAGATORS              tracecontext,baggage
#   OTEL_INSTRUMENTATION_LOGBACK_MDC_ADD_BAGGAGE  true  (inject trace_id/span_id into MDC)
#
# Local development (docker-compose.dev.yml stack):
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318   (local Tempo HTTP/protobuf receiver)
#   OTEL_EXPORTER_OTLP_HEADERS=                     (no auth for local Tempo)
#   Optionally set LOKI_URL=http://loki:3100 to also enable the Loki4j appender

# Loki4j Logback appender (optional, local development only):
#   LOKI_URL=http://loki:3100  — enables direct Loki push alongside OTLP log export.
#   Leave unset in production; OTLP log export via the agent replaces it.
