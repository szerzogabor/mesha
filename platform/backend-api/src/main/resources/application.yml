spring:
  application:
    name: mesha-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mesha}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${CLERK_JWKS_URI:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}

clerk:
  jwks-uri: ${CLERK_JWKS_URI:https://your-clerk-instance.clerk.accounts.dev/.well-known/jwks.json}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Sentry observability configuration
sentry:
  dsn: ${SENTRY_DSN:https://b63b87ccbf37de2bfa73122d07404172@o4511348602241024.ingest.de.sentry.io/4511410200576080}
  environment: ${APP_ENV:local}
  release: ${APP_VERSION:0.0.1-SNAPSHOT}@${GIT_COMMIT:unknown}
  # Capture 100% of transactions in non-production; tune down in production via env var
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:1.0}
  profile-session-sample-rate: ${SENTRY_PROFILE_SAMPLE_RATE:1.0}
  profile-lifecycle: TRACE
  # Forward ERROR+ log events to Sentry automatically
  logging:
    enabled: true
    minimum-event-level: error
    minimum-breadcrumb-level: info
  # Attach request headers and IP for context; PII is scrubbed in BeforeSendCallback
  send-default-pii: true
  # Tag every event with the service name
  tags:
    service: mesha-api

github:
  app:
    app-id: ${GITHUB_APP_ID:0}
    client-id: ${GITHUB_APP_CLIENT_ID:}
    client-secret: ${GITHUB_APP_CLIENT_SECRET:}
    private-key: ${GITHUB_APP_PRIVATE_KEY:}
    webhook-secret: ${GITHUB_APP_WEBHOOK_SECRET:}
    app-name: ${GITHUB_APP_NAME:mesha}

# Structured JSON logging — format handled by logback-spring.xml
logging:
  level:
    root: INFO
    com.mesha: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
