databases:
  - name: mesha-db
    databaseName: mesha
    user: mesha
    plan: free

services:
  - type: redis
    name: mesha-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: mesha-backend-api
    env: docker
    plan: free
    rootDir: platform/backend-api
    branch: main
    autoDeploy: true
    healthCheckPath: /actuator/health
    buildFilter:
      paths:
        - render.yaml
        - platform/backend-api/**
    envVars:
      - key: PORT
        value: "10000"
      - key: SERVER_PORT
        value: "10000"
      - key: DB_HOST
        fromDatabase:
          name: mesha-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mesha-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mesha-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: mesha-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mesha-db
          property: password
      - key: REDIS_URL
        fromService:
          name: mesha-redis
          type: redis
          property: connectionString

  - type: web
    name: mesha-backend-worker
    env: docker
    plan: free
    rootDir: platform/backend-worker
    branch: main
    autoDeploy: true
    buildFilter:
      paths:
        - render.yaml
        - platform/backend-worker/**
    envVars:
      - key: PORT
        value: "10000"
      - key: DB_HOST
        fromDatabase:
          name: mesha-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mesha-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mesha-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: mesha-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mesha-db
          property: password
      - key: REDIS_URL
        fromService:
          name: mesha-redis
          type: redis
          property: connectionString
      - key: BLOCKS_API_URL
        sync: false
      - key: BLOCKS_API_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
