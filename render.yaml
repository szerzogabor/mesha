services:
  - type: web
    name: mesha-backend-api
    env: docker
    rootDir: platform/backend-api
    branch: main
    autoDeploy: true
    healthCheckPath: /actuator/health
    buildFilter:
      paths:
        - render.yaml
        - platform/backend-api/**
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false

  - type: worker
    name: mesha-backend-worker
    env: docker
    rootDir: platform/backend-worker
    branch: main
    autoDeploy: true
    buildFilter:
      paths:
        - render.yaml
        - platform/backend-worker/**
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BLOCKS_API_URL
        sync: false
      - key: BLOCKS_API_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
