databases:
  - name: mesha-db
    databaseName: mesha
    user: mesha
    plan: free

services:
  - type: redis
    name: mesha-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  - type: web
    name: mesha-api
    env: docker
    plan: free
    rootDir: platform/backend-api
    branch: main
    autoDeploy: true
    healthCheckPath: /actuator/health
    buildFilter:
      paths:
        - render.yaml
        - platform/backend-api/**
    envVars:
      - key: PORT
        value: "10000"
      - key: SERVER_PORT
        value: "10000"
      - key: DB_HOST
        fromDatabase:
          name: mesha-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mesha-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mesha-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: mesha-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mesha-db
          property: password
      - key: REDIS_URL
        fromService:
          name: mesha-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLERK_JWKS_URI
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_WORKER_ENABLED
        value: "false"
      # OpenTelemetry — Grafana Cloud OTLP gateway (prod-eu-central-0)
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: "https://otlp-gateway-prod-eu-central-0.grafana.net/otlp"
      - key: OTEL_EXPORTER_OTLP_PROTOCOL
        value: "http/protobuf"
      - key: OTEL_SERVICE_NAME
        value: "mesha-api"
      - key: OTEL_TRACES_EXPORTER
        value: "otlp"
      - key: OTEL_LOGS_EXPORTER
        value: "otlp"
      - key: OTEL_METRICS_EXPORTER
        value: "none"
      - key: OTEL_PROPAGATORS
        value: "tracecontext,baggage"
      - key: OTEL_EXPORTER_OTLP_HEADERS
        value: "Authorization=Basic MTY0OTc2ODpnbGNfZXlKdklqb2lNVGMzTVRRek9TSXNJbTRpT2lKdFpYTm9ZU0lzSW1zaU9pSndOV1J0TXpWcVYzRTBWVTFPTkRoWWRqWTRkalV5VUd3aUxDSnRJanA3SW5JaU9pSndjbTlrTFdWMUxXTmxiblJ5WVd3dE1DSjlmUT09"
      - key: DB_POOL_SIZE
        value: "5"
      - key: TOMCAT_MAX_THREADS
        value: "20"
      - key: TOMCAT_MIN_SPARE_THREADS
        value: "5"
      - key: BLOCKS_API_URL
        sync: false
      - key: BLOCKS_API_KEY
        sync: false
      - key: BLOCKS_ENCRYPTION_SECRET
        sync: false

  - type: worker
    name: mesha-worker
    env: docker
    plan: free
    rootDir: platform/backend-worker
    branch: main
    autoDeploy: true
    buildFilter:
      paths:
        - render.yaml
        - platform/backend-worker/**
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: mesha-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mesha-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mesha-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: mesha-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mesha-db
          property: password
      - key: REDIS_URL
        fromService:
          name: mesha-redis
          type: redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: APP_WORKER_ENABLED
        value: "true"
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        value: "https://otlp-gateway-prod-eu-central-0.grafana.net/otlp"
      - key: OTEL_EXPORTER_OTLP_PROTOCOL
        value: "http/protobuf"
      - key: OTEL_SERVICE_NAME
        value: "mesha-worker"
      - key: OTEL_TRACES_EXPORTER
        value: "otlp"
      - key: OTEL_LOGS_EXPORTER
        value: "otlp"
      - key: OTEL_METRICS_EXPORTER
        value: "none"
      - key: OTEL_PROPAGATORS
        value: "tracecontext,baggage"
      - key: OTEL_EXPORTER_OTLP_HEADERS
        value: "Authorization=Basic MTY0OTc2ODpnbGNfZXlKdklqb2lNVGMzTVRRek9TSXNJbTRpT2lKdFpYTm9ZU0lzSW1zaU9pSndOV1J0TXpWcVYzRTBWVTFPTkRoWWRqWTRkalV5VUd3aUxDSnRJanA3SW5JaU9pSndjbTlrTFdWMUxXTmxiblJ5WVd3dE1DSjlmUT09"
      - key: DB_POOL_SIZE
        value: "3"
      - key: BLOCKS_API_URL
        sync: false
      - key: BLOCKS_API_KEY
        sync: false
      - key: BLOCKS_ENCRYPTION_SECRET
        sync: false
